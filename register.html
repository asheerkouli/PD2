<!DOCTYPE html>
<html>
<head>
  <title>Register RFID Tag</title>
</head>
<body>

<!-- Navbar will load here -->
<div id="navbar"></div>

<script>
  fetch("nav.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
</script>

<h1>Register New RFID Tag</h1>

<p>Select a pending RFID tag and enter the tool information.</p>

<label for="pendingTags">Pending RFID tag:</label>
<select id="pendingTags">
  <option value="">Loading tags...</option>
</select>

<br><br>

<label for="toolName">Name:</label>
<input type="text" id="toolName" placeholder="Enter tool name">

<br><br>

<!-- <label for="category">Category:</label> -->
<!-- <input type="text" id="category" placeholder="Enter category"> -->

<br><br>

<label for="location">Shelf / location:</label>
<input type="text" id="location" placeholder="Enter location">

<br><br>

<label for="stockroom">Stockroom:</label>
<select id="stockroom">
  <option value="Stockholm">Stockholm</option>
  <option value="Uppsala">Uppsala</option>
</select>

<br><br>

<label for="quantity">Quantity:</label>
<input type="number" id="quantity" value="1" min="0">

<br><br>

<button onclick="saveTag()">Save tool</button>

<p id="message"></p>

<script>
const API_BASE = "https://DIN-API-URL"; 
// Exempel: https://abc123.execute-api.eu-north-1.amazonaws.com

async function loadPendingTags() {
  const select = document.getElementById("pendingTags");
  const message = document.getElementById("message");

  try {
    const res = await fetch(`${API_BASE}/items/pending`);
    const tags = await res.json();

    select.innerHTML = "";

    if (!tags.length) {
      select.innerHTML = '<option value="">No pending tags found</option>';
      return;
    }

    tags.forEach(tag => {
      const option = document.createElement("option");
      option.value = tag.rfidTag;
      option.textContent = `${tag.rfidTag} - ${tag.piId || "Unknown Pi"}`;
      select.appendChild(option);
    });

    message.textContent = "";
  } catch (err) {
    console.error(err);
    select.innerHTML = '<option value="">Could not load tags</option>';
    message.textContent = "Error loading pending RFID tags.";
  }
}

async function saveTag() {
  const rfidTag = document.getElementById("pendingTags").value;
  const toolName = document.getElementById("toolName").value.trim();
  const category = document.getElementById("category").value.trim();
  const location = document.getElementById("location").value.trim();
  const stockroom = document.getElementById("stockroom").value;
  const quantity = Number(document.getElementById("quantity").value);
  const message = document.getElementById("message");

  if (!rfidTag) {
    message.textContent = "Please select a pending RFID tag.";
    return;
  }

  if (!toolName || !category || !location) {
    message.textContent = "Please fill in all fields.";
    return;
  }

  const body = {
    toolName: toolName,
    category: category,
    location: location,
    stockroom: stockroom,
    quantity: quantity
  };

  try {
    const res = await fetch(`${API_BASE}/items/${rfidTag}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      throw new Error("Failed to save tool");
    }

    message.textContent = `Tool saved for RFID tag ${rfidTag}.`;

    document.getElementById("toolName").value = "";
    document.getElementById("category").value = "";
    document.getElementById("location").value = "";
    document.getElementById("stockroom").value = "Stockholm";
    document.getElementById("quantity").value = 1;

    loadPendingTags();
  } catch (err) {
    console.error(err);
    message.textContent = "Error saving tool data.";
  }
}

loadPendingTags();
</script>

</body>
</html>
