<!DOCTYPE html>
<html>
<head> 
  <title>Reports</title>
</head>
<body>

<!-- Navbar will load here -->
<div id="navbar"></div>

<script>
  fetch("nav.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
</script>

<h1>Reports</h1>

<p>Items with low stock (less than 5 in quantity).</p>

<table border="1" cellpadding="8" cellspacing="0" id="reportsTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Quantity</th>
      <th>Shelf</th>
      <th>Stockroom</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const sheetID = "1seAFDHbUnBUQsiluS2PomDIpTpi_0HbbmPWAssUMlh0";
const url = `https://opensheet.elk.sh/${sheetID}/Sheet1`;

fetch(url)
  .then(res => res.json())
  .then(data => {
    const tableBody = document.querySelector("#reportsTable tbody");

    const lowStock = data.filter(row => Number(row.Quantity) < 5);

    lowStock.forEach(row => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row.ID}</td>
        <td>${row.Name}</td>
        <td style="color: red; font-weight: bold;">${row.Quantity}</td>
        <td>${row.Place}</td>
        <td>${row.Stockroom}</td>
      `;

      tableBody.appendChild(tr);
    });
  })
  .catch(err => console.error("Error loading sheet:", err));
</script>

</body>
</html>
