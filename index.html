<!DOCTYPE html>
<html>
<head>
  <title>Smart Inventory</title>
</head>
<body>

<!-- Navbar will load here -->
<div id="navbar"></div>

<script>
  fetch("nav.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
</script>

<h1 style="font-size: 36px; margin-top: 20px;">
  PROJEKTKURS 2 - SMART INVENTORY
</h1>

<!-- Search -->
<input type="text" id="searchInput" placeholder="Name or ID-Number" style="width: 300px; padding: 8px;">
<button style="padding: 8px;" onclick="searchTable()">Search</button>

<br><br>

<!-- Result table -->
<table border="1" cellpadding="8" cellspacing="0" id="searchTable">
  <thead>
    <tr>
      <th>Product ID</th>
      <th>Shelf ID</th>
      <th>Current Weight</th>
      <th>Tare Weight</th>
      <th>Last Updated</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const apiURL = "https://e3egai64zh.execute-api.eu-north-1.amazonaws.com/items";

let allData = [];

// Load data once from AWS
fetch(apiURL)
  .then(res => res.json())
  .then(data => {
    allData = data;
  });

// Search function
function searchTable() {
  const input = document.getElementById("searchInput").value.toLowerCase();
  const tableBody = document.querySelector("#searchTable tbody");

  tableBody.innerHTML = "";

  const filtered = allData.filter(row =>
    row.product_id.toString().includes(input) ||
    row.shelf_id.toString().includes(input)
  );

  filtered.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.product_id}</td>
      <td>${row.shelf_id}</td>
      <td>${Math.round(row.current_total_weight)}</td>
      <td>${row.tare_weight}</td>
      <td>${row.last_updated}</td>
    `;

    tableBody.appendChild(tr);
  });
}
</script>

</body>
</html>
