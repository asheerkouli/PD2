<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>
</head>
<body>

<!-- Navbar will load here -->
<div id="navbar"></div>

<script>
  fetch("nav.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
</script>

<h1>Inventory</h1>

<label>Select stockroom: </label>
<select id="stockroomFilter">
  <option value="All">All</option>
  <option value="Stockholm">Stockholm</option>
  <option value="Uppsala">Uppsala</option>
</select>

<table border="1" cellpadding="8" cellspacing="0" id="inventoryTable">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Quantity</th>
      <th>Place</th>
      <th>Stockroom</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const sheetID = "1seAFDHbUnBUQsiluS2PomDIpTpi_0HbbmPWAssUMlh0";
const url = `https://opensheet.elk.sh/${sheetID}/Sheet1`;

let allData = [];

fetch(url)
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderTable(data);
  });

function renderTable(data) {
  const tableBody = document.querySelector("#inventoryTable tbody");
  tableBody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.ID}</td>
      <td>${row.Name}</td>
      <td>${row.Quantity}</td>
      <td>${row.Place}</td>
      <td>${row.Stockroom}</td>
    `;

    tableBody.appendChild(tr);
  });
}

// Filter logic
document.getElementById("stockroomFilter").addEventListener("change", function () {
  const selected = this.value;

  if (selected === "All") {
    renderTable(allData);
  } else {
    const filtered = allData.filter(row => row.Stockroom === selected);
    renderTable(filtered);
  }
});
</script>

</body>

</html>
