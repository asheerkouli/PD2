<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>
</head>
<body>

<!-- Navbar will load here -->
<div id="navbar"></div>

<script>
  fetch("nav.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;
    });
</script>

<h1>Inventory</h1>

<table border="1" cellpadding="8" cellspacing="0" id="inventoryTable">
  <thead>
    <tr>
      <th>Product ID</th>
      <th>Shelf ID</th>
      <th>Location</th>
      <th>Current Weight</th>
      <th>Tare Weight</th>
      <th>Last Updated</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const apiURL = "https://e3egai64zh.execute-api.eu-north-1.amazonaws.com/items";

let allData = [];

fetch(apiURL)
  .then(res => res.json())
  .then(data => {
    if (typeof data === "string") {
      allData = JSON.parse(data);
    } else if (data.body) {
      allData = JSON.parse(data.body);
    } else {
      allData = data;
    }

    renderTable(allData);
  });

function renderTable(data) {
  const tableBody = document.querySelector("#inventoryTable tbody");
  tableBody.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.product_id}</td>
      <td>${row.shelf_id}</td>
      <td>${row.location}</td>
      <td>${Math.round(row.current_total_weight)}</td>
      <td>${row.tare_weight}</td>
      <td>${row.last_updated}</td>
    `;

    tableBody.appendChild(tr);
  });
}
</script>

</body>
</html>
